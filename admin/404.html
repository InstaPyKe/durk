<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin 404 - Node Offline | durkwalmart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #e6edf3;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .glass-panel {
            background: rgba(22, 27, 34, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .error-code {
            font-size: 8rem;
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(to bottom, #10b981, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(16, 185, 129, 0.3));
        }
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.1; }
        }
        .bg-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse-slow 4s infinite ease-in-out;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <div class="glass-panel p-12 rounded-[2.5rem] shadow-2xl max-w-lg w-full text-center relative z-10 mx-4">
        <div class="error-code mb-4">404</div>
        <h1 class="text-2xl font-black text-white mb-4 uppercase tracking-tighter">Admin Node Offline</h1>
        <p class="text-gray-400 mb-8 leading-relaxed text-sm">
            The administrative node <span class="text-blue-400 font-mono font-bold" id="admin-path-display"></span> is currently unreachable or does not exist in the secure sector.
        </p>
        
        <div class="flex flex-col gap-3">
            <a href="/admin/admin-login.html" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl transition-all uppercase tracking-widest shadow-lg shadow-blue-500/20 text-sm">
                Return to Admin Auth
            </a>
            <button onclick="history.back()" class="w-full bg-white/5 hover:bg-white/10 text-white font-bold py-3 rounded-xl border border-white/10 transition-all uppercase text-[10px] tracking-widest">
                Revert Command
            </button>
        </div>
    </div>

    <script>
        // Display only the filename/node to avoid leaking system file paths
        const fullPath = window.location.pathname;
        const nodeName = fullPath.split('/').pop() || "Unknown Node";
        document.getElementById('admin-path-display').innerText = nodeName;
    </script>
</body>
</html>
