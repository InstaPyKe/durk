<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | DurkWalmat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .glass-panel {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @media (max-width: 320px) {
            body {
                padding: 0.5rem !important;
            }

            .glass-panel {
                padding: 1rem !important;
                border-radius: 1rem !important;
            }

            h1 {
                font-size: 1.5rem !important;
            }

            input {
                padding-top: 0.5rem !important;
                padding-bottom: 0.5rem !important;
                padding-left: 2.25rem !important;
                font-size: 11px !important;
            }

            label {
                font-size: 9px !important;
            }

            .pl-12 {
                padding-left: 2.25rem !important;
            }

            .bi {
                left: 0.75rem !important;
            }
        }
    </style>
</head>

<body class="bg-gray-950 text-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md glass-panel p-8 rounded-2xl shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black tracking-tighter text-white mb-2">
                durk<span class="text-emerald-500">ADMIN</span>
            </h1>
            <p class="text-gray-400 text-sm font-medium">Restricted Access: Administrative Terminal</p>
        </div>

        <form id="adminLoginForm" class="space-y-6">
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-gray-500 mb-2">Admin Email</label>
                <div class="relative">
                    <i class="bi bi-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    <input type="email" id="email" value="adminbravin@durk.com" required
                        class="w-full bg-gray-900/50 border border-gray-800 rounded-xl py-3 pl-12 pr-4 focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 transition outline-none">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-gray-500 mb-2">Access Key</label>
                <div class="relative">
                    <i class="bi bi-shield-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    <input type="password" id="accessKey" value="qwerty123#" required
                        class="w-full bg-gray-900/50 border border-gray-800 rounded-xl py-3 pl-12 pr-4 focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 transition outline-none">
                </div>
            </div>

            <button type="submit" id="loginBtn"
                class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-xl transition-all shadow-lg shadow-emerald-900/20 active:scale-[0.98]">
                Establish Connection
            </button>
        </form>

        <div id="statusMessage" class="mt-6 transition-all duration-300 transform scale-95 opacity-0 hidden"></div>
    </div>

    <script>
        const loginForm = document.getElementById('adminLoginForm');
        const loginBtn = document.getElementById('loginBtn');
        const statusMsg = document.getElementById('statusMessage');

        function updateStatus(message, type) {
            statusMsg.classList.remove('hidden');

            // Apply transitions on next frame
            requestAnimationFrame(() => {
                statusMsg.classList.remove('scale-95', 'opacity-0');
                statusMsg.classList.add('scale-100', 'opacity-100');
            });

            const configs = {
                info: {
                    bg: 'bg-blue-500/10 border-blue-500/20 text-blue-400 shadow-[0_4px_20px_rgba(59,130,246,0.15)]',
                    icon: '<i class="bi bi-arrow-repeat animate-spin text-sm mr-2.5"></i>'
                },
                success: {
                    bg: 'bg-emerald-500/10 border-emerald-500/20 text-emerald-400 shadow-[0_4px_20px_rgba(16,185,129,0.15)]',
                    icon: '<i class="bi bi-shield-check text-sm mr-2.5"></i>'
                },
                error: {
                    bg: 'bg-rose-500/10 border-rose-500/20 text-rose-400 shadow-[0_4px_20px_rgba(244,63,94,0.15)]',
                    icon: '<i class="bi bi-exclamation-octagon text-sm mr-2.5"></i>'
                }
            };

            const config = configs[type] || configs.info;
            statusMsg.className = `mt-6 p-4 rounded-xl border text-xs font-bold uppercase tracking-wider flex items-center justify-center transition-all duration-300 transform ${config.bg}`;
            statusMsg.innerHTML = `${config.icon} <span>${message}</span>`;
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('accessKey').value.trim();

            // Set state to authenticating
            updateStatus("Establishing connection with central node...", "info");
            loginBtn.disabled = true;
            loginBtn.classList.add('opacity-50', 'cursor-not-allowed');

            try {
                const response = await fetch('/api/users/admin-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: email,
                        password: password
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    updateStatus("Access granted. Initializing session...", "success");
                    localStorage.setItem('token', data.token);
                    setTimeout(() => {
                        window.location.href = '/admin/admin-dashboard.html';
                    }, 1000);
                } else {
                    throw new Error(data.message || "Authentication Handshake Failed");
                }
            } catch (error) {
                updateStatus(error.message, "error");
                loginBtn.disabled = false;
                loginBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        });
    </script>
</body>

</html>
