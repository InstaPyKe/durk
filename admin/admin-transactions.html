<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Manager | durkADMIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-green: #00ea87;
            --glass-bg: rgba(22, 27, 34, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
        }
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        body { background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }

        /* --- Global System Notification Engine --- */
        #systemNotification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 9999;
            padding: 14px 20px;
            border-radius: 12px;
            background: rgba(0, 234, 135, 0.1); /* Glassy Green tint */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 234, 135, 0.3);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            display: none;
            align-items: center;
            gap: 12px;
            max-width: 350px;
            animation: slideInNotify 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        @keyframes slideInNotify {
            from { transform: translateX(50px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .notif-icon-box { flex-shrink: 0; width: 22px; height: 22px; }
        .notif-text-box { display: flex; flex-direction: column; overflow: hidden; }
        .notif-title { font-size: 0.7rem; font-weight: 900; color: var(--primary-green); text-transform: uppercase; letter-spacing: 1.2px; }
        .notif-message { font-size: 0.6rem; font-style: italic; color: rgba(255, 255, 255, 0.8); line-height: 1.4; text-overflow: ellipsis; overflow: hidden; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">
    <admin-header active="transactions"></admin-header>

    <div class="flex flex-1 overflow-hidden">
        <admin-sidebar active="transactions"></admin-sidebar>

        <main class="flex-1 overflow-y-auto p-8">
        <div class="max-w-7xl mx-auto">
            <div class="flex justify-between items-end mb-10">
                <div>
                    <h1 class="text-4xl font-black tracking-tighter">Financial <span class="text-emerald-500">Ledger</span></h1>
                    <p class="text-gray-500 text-sm font-bold uppercase tracking-widest mt-2">Unified Transaction Monitoring Node</p>
                </div>
                <div class="flex items-center gap-4">
                    <div class="relative">
                        <i class="bi bi-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-xs"></i>
                        <input type="text" id="transactionSearchInput" placeholder="Search agents, ID or amount..." 
                            class="bg-white/5 border border-gray-800 rounded-xl py-2.5 pl-9 pr-4 text-xs focus:border-emerald-500 outline-none transition w-64">
                    </div>
                    <select id="statusFilter" class="bg-white/5 border border-gray-800 rounded-xl py-2.5 px-4 text-xs focus:border-emerald-500 outline-none transition text-gray-400">
                        <option value="all" class="bg-gray-900">All Status</option>
                        <option value="Completed" class="bg-gray-900 text-white">Completed</option>
                        <option value="Pending" class="bg-gray-900 text-white">Pending</option>
                        <option value="Failed" class="bg-gray-900 text-white">Failed</option>
                    </select>
                </div>
            </div>

            <div class="glass-panel rounded-3xl overflow-hidden shadow-2xl">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-[10px] uppercase tracking-widest text-gray-500 font-black border-b border-gray-800">
                            <th class="px-8 py-5">Flow</th>
                            <th class="px-8 py-5">Agent</th>
                            <th class="px-8 py-5">Amount</th>
                            <th class="px-8 py-5">Source Node</th>
                            <th class="px-8 py-5">Status</th>
                            <th class="px-8 py-5 text-right">Timestamp</th>
                        </tr>
                    </thead>
                    <tbody id="transactionTableBody">
                        <!-- Synchronizing Data... -->
                    </tbody>
                </table>
            </div>
        </div>
        </main>
    </div>

    <!-- Global Glassy Notification Portal -->
    <div id="systemNotification">
        <div class="notif-icon-box" id="notifIcon"></div>
        <div class="notif-text-box">
            <div class="notif-title" id="notifTitle">SYSTEM</div>
            <div class="notif-message" id="notifMessage">Initialising protocols...</div>
        </div>
    </div>

    <script>
        // Global System Messaging Interface
        window.showSystemMessage = function(message, type = 'success') {
            const notification = document.getElementById('systemNotification');
            const iconBox = document.getElementById('notifIcon');
            const titleEl = document.getElementById('notifTitle');
            const msgEl = document.getElementById('notifMessage');

            const types = {
                success: {
                    title: 'Transaction Success',
                    color: '#00ea87',
                    svg: '<svg viewBox="0 0 24 24" fill="none" stroke="#00ea87" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
                },
                error: {
                    title: 'Transaction Fault',
                    color: '#ff4d4d',
                    svg: '<svg viewBox="0 0 24 24" fill="none" stroke="#ff4d4d" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'
                },
                info: {
                    title: 'Ledger Sync',
                    color: '#0070f3',
                    svg: '<svg viewBox="0 0 24 24" fill="none" stroke="#0070f3" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>'
                }
            };

            const config = types[type] || types.success;
            iconBox.innerHTML = config.svg;
            titleEl.innerText = config.title;
            titleEl.style.color = config.color;
            msgEl.innerText = message;

            notification.style.display = 'flex';
            notification.style.opacity = '1';
            notification.style.transform = 'translateX(0)';

            if (window.notifTimeout) clearTimeout(window.notifTimeout);
            window.notifTimeout = setTimeout(() => {
                notification.style.opacity = '0';
                notification.style.transform = 'translateX(20px)';
                setTimeout(() => { notification.style.display = 'none'; }, 500);
            }, 5000);
        };

        // Global Localhost/Matrix Error Catching
        window.onerror = (msg) => window.showSystemMessage(`Terminal Exception: ${msg}`, 'error');
        window.onunhandledrejection = (e) => window.showSystemMessage(`Async Portal Breach: ${e.reason}`, 'error');
    </script>
    <script src="/admin/admin-nav.js"></script>
    <script src="/admin/admin-transactions.js"></script>
</body>
</html>
