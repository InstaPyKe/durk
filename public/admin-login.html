<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Handshake | DurkWalmat Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --primary-green: #00ea87;
            --glass-bg: rgba(22, 27, 34, 0.8);
            --glass-border: rgba(255, 255, 255, 0.08);
        }
        body {
            background: radial-gradient(circle at top right, #1a202c, #0d1117);
            color: #e6edf3;
            font-family: 'Inter', sans-serif;
        }
        .admin-glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-top: 4px solid #ef4444; 
        }

        /* --- Global System Notification Engine --- */
        #systemNotification {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 9999;
            padding: 16px 20px;
            border-radius: 12px;
            background: rgba(0, 234, 135, 0.08); /* Green glassy tint */
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 234, 135, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            gap: 12px;
            max-width: 380px;
            animation: slideUp 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            transition: opacity 0.4s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .notif-icon-box { flex-shrink: 0; width: 20px; height: 20px; }
        .notif-text-box { display: flex; flex-direction: column; }
        .notif-title { 
            font-size: 0.75rem; 
            font-weight: 900; 
            color: var(--primary-green); 
            text-transform: uppercase; 
            letter-spacing: 1.5px;
        }
        .notif-message { 
            font-size: 0.65rem; 
            font-style: italic; 
            color: rgba(255, 255, 255, 0.9); 
            line-height: 1.4;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-md admin-glass-panel p-10 rounded-[2rem] shadow-2xl relative">
        <div class="text-center mb-10">
            <h1 class="text-2xl font-black text-white tracking-tighter mb-1">ADMIN<span class="text-red-500">CONTROL</span></h1>
            <p class="text-[10px] uppercase tracking-[0.3em] text-gray-500 font-bold">Secure Root Access Required</p>
        </div>

        <form id="adminLoginForm" class="space-y-5">
            <div>
                <input type="text" id="adminId" required class="w-full bg-black/40 border border-white/5 rounded-xl py-3 px-4 outline-none focus:border-red-500/50 transition text-sm text-white" placeholder="Master Key Identifier">
            </div>
            <div>
                <input type="password" id="adminPass" required class="w-full bg-black/40 border border-white/5 rounded-xl py-3 px-4 outline-none focus:border-red-500/50 transition text-sm text-white" placeholder="Passphrase">
            </div>
            <button type="submit" class="w-full bg-red-600 hover:bg-red-500 text-white font-black uppercase text-[10px] tracking-widest py-4 rounded-xl transition-all shadow-lg shadow-red-900/20 active:scale-95">
                Initialize Session
            </button>
        </form>
    </div>

    <!-- Global Glassy Notification Portal -->
    <div id="systemNotification">
        <div class="notif-icon-box" id="notifIcon"></div>
        <div class="notif-text-box">
            <div class="notif-title" id="notifTitle">SYSTEM</div>
            <div class="notif-message" id="notifMessage">Syncing telemetry data...</div>
        </div>
    </div>

    <script>
        // Global System Messaging Interface
        window.showSystemMessage = function(message, type = 'success') {
            const notification = document.getElementById('systemNotification');
            const iconBox = document.getElementById('notifIcon');
            const titleEl = document.getElementById('notifTitle');
            const msgEl = document.getElementById('notifMessage');

            const types = {
                success: {
                    title: 'Sync Success',
                    color: '#00ea87',
                    svg: '<svg viewBox="0 0 24 24" fill="none" stroke="#00ea87" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
                },
                error: {
                    title: 'Access Denied',
                    color: '#ff4444',
                    svg: '<svg viewBox="0 0 24 24" fill="none" stroke="#ff4444" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'
                },
                info: {
                    title: 'System Node',
                    color: '#0070f3',
                    svg: '<svg viewBox="0 0 24 24" fill="none" stroke="#0070f3" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>'
                }
            };

            const config = types[type] || types.success;
            iconBox.innerHTML = config.svg;
            titleEl.innerText = config.title;
            titleEl.style.color = config.color;
            msgEl.innerText = message;

            notification.style.display = 'flex';
            notification.style.opacity = '1';

            setTimeout(() => {
                notification.style.opacity = '0';
                setTimeout(() => { notification.style.display = 'none'; }, 400);
            }, 4000);
        };

        // Localhost Error Interceptors
        window.onerror = (msg) => window.showSystemMessage(`Dev Exception: ${msg}`, 'error');
        window.onunhandledrejection = (e) => window.showSystemMessage(`Portal Breach: ${e.reason}`, 'error');

        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            window.showSystemMessage("Requesting root authorization...", "info");
            // Example trigger
            // setTimeout(() => window.showSystemMessage("Root session established.", "success"), 1500);
        });
    </script>
</body>
</html>
