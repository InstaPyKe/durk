<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payout Management | DurkWalmat Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --primary-green: #00ea87;
            --glass-bg: rgba(22, 27, 34, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
        }
        body {
            background: radial-gradient(circle at top right, #1a202c, #0d1117);
            color: #e6edf3;
            font-family: 'Inter', sans-serif;
        }
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
        }

        /* --- Global System Notification Engine --- */
        #systemNotification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 9999;
            padding: 14px 20px;
            border-radius: 12px;
            background: rgba(0, 234, 135, 0.1); /* Glassy Green tint */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 234, 135, 0.3);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            display: none;
            align-items: center;
            gap: 12px;
            max-width: 350px;
            animation: slideInNotify 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        @keyframes slideInNotify {
            from { transform: translateX(50px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .notif-icon-box { flex-shrink: 0; width: 22px; height: 22px; }
        .notif-text-box { display: flex; flex-direction: column; overflow: hidden; }
        .notif-title { 
            font-size: 0.7rem; 
            font-weight: 900; 
            color: var(--primary-green); 
            text-transform: uppercase; 
            letter-spacing: 1.2px;
        }
        .notif-message { 
            font-size: 0.6rem; 
            font-style: italic; 
            color: rgba(255, 255, 255, 0.8); 
            line-height: 1.4;
            text-overflow: ellipsis;
            overflow: hidden;
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-64 glass-panel border-r border-white/5 p-8 flex flex-col gap-8">
        <h2 class="text-xl font-black tracking-tighter">DURK<span class="text-emerald-500">PAYOUTS</span></h2>
        <nav class="flex flex-col gap-3">
            <a href="admin-dashboard.html" class="p-3 rounded-xl hover:bg-white/5 transition text-xs font-bold text-gray-500 hover:text-white flex items-center gap-3"><i class="bi bi-grid-1x2"></i> Dashboard</a>
            <a href="admin-tasks.html" class="p-3 rounded-xl hover:bg-white/5 transition text-xs font-bold text-gray-500 hover:text-white flex items-center gap-3"><i class="bi bi-list-task"></i> Task Queue</a>
            <a href="#" class="p-3 rounded-xl bg-emerald-500/10 text-emerald-400 text-xs font-bold flex items-center gap-3"><i class="bi bi-wallet2"></i> Payout Ledger</a>
        </nav>
    </aside>

    <main class="flex-1 p-12 overflow-y-auto">
        <header class="mb-12 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-black tracking-tight">Payout Ledger</h1>
                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-[0.3em] mt-2">Financial Transaction Audit</p>
            </div>
            <button onclick="window.showSystemMessage('Initiating payout audit...', 'info')" class="glass-panel px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-white/5 transition">
                Audit Transactions
            </button>
        </header>

        <!-- Payouts Interface Placeholder -->
        <div class="glass-panel p-8 rounded-[2rem] border-t-2 border-emerald-500/30">
            <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-6">Pending Payouts</p>
            <div class="space-y-4">
                <div class="flex items-center justify-between p-4 bg-black/20 rounded-xl border border-white/5">
                    <span class="text-xs font-medium">Payout to User #1001 (KSh 500)</span>
                    <span class="text-[9px] bg-yellow-500/20 text-yellow-400 px-3 py-1 rounded-full font-bold">PENDING</span>
                </div>
                <div class="flex items-center justify-between p-4 bg-black/20 rounded-xl border border-white/5">
                    <span class="text-xs font-medium">Payout to User #1002 (KSh 1200)</span>
                    <span class="text-[9px] bg-yellow-500/20 text-yellow-400 px-3 py-1 rounded-full font-bold">PENDING</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Global Glassy Notification Portal -->
    <div id="systemNotification">
        <div class="notif-icon-box" id="notifIcon"></div>
        <div class="notif-text-box">
            <div class="notif-title" id="notifTitle">SYSTEM</div>
            <div class="notif-message" id="notifMessage">Initialising protocols...</div>
        </div>
    </div>

    <script>
        // Global System Messaging Interface
        window.showSystemMessage = function(message, type = 'success') {
            const notification = document.getElementById('systemNotification');
            const iconBox = document.getElementById('notifIcon');
            const titleEl = document.getElementById('notifTitle');
            const msgEl = document.getElementById('notifMessage');

            const types = {
                success: {
                    title: 'Transaction Success',
                    color: '#00ea87',
                    svg: '<svg viewBox="0 0 24 24" fill="none" stroke="#00ea87" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
                },
                error: {
                    title: 'Transaction Fault',
                    color: '#ff4d4d',
                    svg: '<svg viewBox="0 0 24 24" fill="none" stroke="#ff4d4d" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'
                },
                info: {
                    title: 'Ledger Sync',
                    color: '#0070f3',
                    svg: '<svg viewBox="0 0 24 24" fill="none" stroke="#0070f3" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>'
                }
            };

            const config = types[type] || types.success;
            iconBox.innerHTML = config.svg;
            titleEl.innerText = config.title;
            titleEl.style.color = config.color;
            msgEl.innerText = message;

            notification.style.display = 'flex';
            notification.style.opacity = '1';
            notification.style.transform = 'translateX(0)';

            if (window.notifTimeout) clearTimeout(window.notifTimeout);
            window.notifTimeout = setTimeout(() => {
                notification.style.opacity = '0';
                notification.style.transform = 'translateX(20px)';
                setTimeout(() => { notification.style.display = 'none'; }, 500);
            }, 5000);
        };

        // Global Localhost/Matrix Error Catching
        window.onerror = (msg) => window.showSystemMessage(`Exception: ${msg}`, 'error');
        window.onunhandledrejection = (e) => window.showSystemMessage(`Async Breach: ${e.reason}`, 'error');
    </script>
</body>
</html>
