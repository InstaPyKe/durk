<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management | DurkWalmat Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --primary-green: #00ea87;
            --glass-bg: rgba(22, 27, 34, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
        }
        body {
            background: radial-gradient(circle at top left, #1a202c, #0d1117);
            color: #e6edf3;
            font-family: 'Inter', sans-serif;
        }
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
        }

        /* --- Global System Notification Engine --- */
        #systemNotification {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 9999;
            padding: 16px 20px;
            border-radius: 12px;
            background: rgba(0, 234, 135, 0.08); /* Green glassy tint */
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 234, 135, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            gap: 12px;
            max-width: 380px;
            animation: slideInNotify 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            transition: opacity 0.4s ease;
        }
        @keyframes slideInNotify {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .notif-icon-box { flex-shrink: 0; width: 20px; height: 20px; }
        .notif-text-box { display: flex; flex-direction: column; }
        .notif-title { 
            font-size: 0.75rem; 
            font-weight: 900; 
            color: var(--primary-green); 
            text-transform: uppercase; 
            letter-spacing: 1.5px;
        }
        .notif-message { 
            font-size: 0.65rem; 
            font-style: italic; 
            color: rgba(255, 255, 255, 0.9); 
            line-height: 1.4;
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-64 glass-panel border-r border-white/5 p-8 flex flex-col gap-8">
        <h2 class="text-xl font-black tracking-tighter">DURK<span class="text-emerald-500">TASKS</span></h2>
        <nav class="flex flex-col gap-3">
            <a href="admin-dashboard.html" class="p-3 rounded-xl hover:bg-white/5 transition text-xs font-bold text-gray-500 hover:text-white flex items-center gap-3"><i class="bi bi-grid-1x2"></i> Dashboard</a>
            <a href="#" class="p-3 rounded-xl bg-emerald-500/10 text-emerald-400 text-xs font-bold flex items-center gap-3"><i class="bi bi-list-task"></i> Task Queue</a>
        </nav>
    </aside>

    <main class="flex-1 p-12 overflow-y-auto">
        <header class="mb-12 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-black tracking-tight">Active Task Queue</h1>
                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-[0.3em] mt-2">Matrix Synchronization: Online</p>
            </div>
            <button onclick="window.showSystemMessage('Polling latest task distribution...', 'info')" class="glass-panel px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-white/5 transition">
                Refresh Nodes
            </button>
        </header>

        <!-- Task Interface Placeholder -->
        <div class="glass-panel p-8 rounded-[2rem] border-t-2 border-emerald-500/30">
            <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-6">Pending Operations</p>
            <div class="space-y-4">
                <div class="flex items-center justify-between p-4 bg-black/20 rounded-xl border border-white/5 group">
                    <div class="flex flex-col">
                        <span class="text-xs font-medium">Verify Ad Engagement Node #824</span>
                        <span class="text-[8px] text-gray-500 uppercase mt-1">Status: Queue Ready</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-[9px] bg-emerald-500/20 text-emerald-400 px-3 py-1 rounded-full font-bold">READY</span>
                        <button onclick="window.deleteTask(824)" class="w-8 h-8 rounded-lg bg-rose-500/10 text-rose-500 hover:bg-rose-500 hover:text-white transition flex items-center justify-center opacity-0 group-hover:opacity-100">
                            <i class="bi bi-trash3 text-sm"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Glassy Decision Modal -->
    <div id="glassDecisionModal" class="fixed inset-0 z-[10000] flex items-center justify-center bg-black/60 backdrop-blur-sm hidden">
        <div class="glass-panel p-8 rounded-[2rem] max-w-sm w-full mx-4 border-t-4 border-rose-500 shadow-2xl">
            <div id="decisionIcon" class="w-12 h-12 rounded-2xl bg-rose-500/10 flex items-center justify-center text-rose-500 mb-6"></div>
            <h3 id="decisionTitle" class="text-lg font-black uppercase tracking-tighter text-white mb-2">Confirm Protocol</h3>
            <p id="decisionText" class="text-xs italic text-gray-400 leading-relaxed mb-8">Are you sure you want to proceed with this protocol?</p>
            <div class="flex gap-3">
                <button id="decisionConfirm" class="flex-1 bg-rose-600 hover:bg-rose-500 text-white font-black uppercase text-[10px] tracking-widest py-3 rounded-xl transition-all shadow-lg shadow-rose-900/20">Confirm</button>
                <button id="decisionAbort" class="flex-1 bg-white/5 hover:bg-white/10 text-white font-black uppercase text-[10px] tracking-widest py-3 rounded-xl border border-white/10 transition-all">Abort</button>
            </div>
        </div>
    </div>

    <!-- Global Glassy Notification Portal -->
    <div id="systemNotification">
        <div class="notif-icon-box" id="notifIcon"></div>
        <div class="notif-text-box">
            <div class="notif-title" id="notifTitle">SYSTEM</div>
            <div class="notif-message" id="notifMessage">Initialising telemetry...</div>
        </div>
    </div>

    <script>
        // Global Decision Handshake Utility
        window.triggerGlassDecision = function(title, text, onConfirm, onAbort = () => {}) {
            const modal = document.getElementById('glassDecisionModal');
            if (!modal) return;
            document.getElementById('decisionTitle').innerText = title;
            document.getElementById('decisionText').innerText = text;
            document.getElementById('decisionIcon').innerHTML = `<i class="bi bi-shield-exclamation text-xl"></i>`;
            
            modal.classList.remove('hidden');
            
            const cleanup = () => {
                modal.classList.add('hidden');
                document.getElementById('decisionConfirm').onclick = null;
                document.getElementById('decisionAbort').onclick = null;
            };
            
            document.getElementById('decisionAbort').onclick = () => {
                cleanup();
                onAbort();
            };
            document.getElementById('decisionConfirm').onclick = () => {
                cleanup();
                onConfirm();
            };
        };

        // Global System Messaging Interface
        window.showSystemMessage = function(message, type = 'success') {
            const notification = document.getElementById('systemNotification');
            const iconBox = document.getElementById('notifIcon');
            const titleEl = document.getElementById('notifTitle');
            const msgEl = document.getElementById('notifMessage');

            const types = {
                success: {
                    title: 'Sync Success',
                    color: '#00ea87',
                    svg: '<svg viewBox="0 0 24 24" fill="none" stroke="#00ea87" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
                },
                error: {
                    title: 'Node Fault',
                    color: '#ff4d4d',
                    svg: '<svg viewBox="0 0 24 24" fill="none" stroke="#ff4d4d" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'
                },
                info: {
                    title: 'Portal Sync',
                    color: '#0070f3',
                    svg: '<svg viewBox="0 0 24 24" fill="none" stroke="#0070f3" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>'
                }
            };

            const config = types[type] || types.success;
            iconBox.innerHTML = config.svg;
            titleEl.innerText = config.title;
            titleEl.style.color = config.color;
            msgEl.innerText = message;

            notification.style.display = 'flex';
            notification.style.opacity = '1';

            if (window.notifTimeout) clearTimeout(window.notifTimeout);
            window.notifTimeout = setTimeout(() => {
                notification.style.opacity = '0';
                setTimeout(() => { notification.style.display = 'none'; }, 400);
            }, 4000);
        };

        // Global Localhost/Matrix Error Catching
        window.onerror = (msg) => window.showSystemMessage(`Terminal Exception: ${msg}`, 'error');
        window.onunhandledrejection = (e) => window.showSystemMessage(`Async Portal Breach: ${e.reason}`, 'error');
    </script>
</body>
</html>
