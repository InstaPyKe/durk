<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background: #0d1117;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Glassy Message Interface */
        .glass-status-container {
            width: 400px;
            height: 100px;
            box-sizing: border-box;
            background: rgba(0, 234, 135, 0.08); /* Green glassy tint */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 234, 135, 0.4); /* Green border */
            border-left: 6px solid #00ea87; /* Stronger accent border */
            border-radius: 16px;
            display: flex;
            align-items: center;
            padding: 0 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            color: #e6edf3;
            font-family: 'Inter', system-ui, sans-serif;
            gap: 18px;
            transition: transform 0.3s ease;
        }

        .status-icon-wrapper {
            width: 42px;
            height: 42px;
            background: rgba(0, 234, 135, 0.15);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00ea87;
            flex-shrink: 0;
        }

        .status-content h4 { margin: 0; font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: #00ea87; }
        .status-content p { margin: 4px 0 0 0; font-size: 13px; color: rgba(255, 255, 255, 0.7); line-height: 1.4; }
    </style>
</head>
<body>

    <div class="glass-status-container">
        <div class="status-icon-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
        </div>
        <div class="status-content">
            <h4>System Message</h4>
            <p>The terminal synchronization protocol has been successfully verified.</p>
        </div>
    </div>

</body>
</html>
