<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | DurkWalmart Engine</title>
    <!-- Google Fonts Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        /* Modern Premium Style Design matching register.html */
        :root {
            --primary-green: #10b981;
            --primary-blue: #3b82f6;
            --danger-red: #ef4444;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --glass-bg: rgba(30, 41, 59, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(12px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: radial-gradient(circle at top right, rgba(16, 185, 129, 0.07), transparent 450px),
                radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.07), transparent 450px),
                #0b0f19;
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Centered Login Card */
        .auth-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            width: 100%;
            max-width: 440px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .auth-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
            border-color: rgba(16, 185, 129, 0.2);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-header h1 {
            font-size: 1.85rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #fff;
            margin-bottom: 6px;
        }

        .auth-header h1 span {
            color: var(--primary-green);
        }

        .auth-header p {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-muted);
            font-weight: 700;
        }

        /* Form Groups */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-light);
            opacity: 0.9;
        }

        .input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 16px 12px 42px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.25s ease;
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .form-input:focus {
            border-color: var(--primary-green);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
            background: rgba(15, 23, 42, 0.8);
        }

        /* Icon prefix styles */
        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.3);
            font-size: 1rem;
            pointer-events: none;
            transition: color 0.25s ease;
        }

        .form-input:focus~.input-icon {
            color: var(--primary-green);
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--primary-green);
            color: #0b0f19;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-submit:hover {
            background: #059669;
            transform: translateY(-1px);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.3);
            cursor: not-allowed;
            transform: none;
        }

        /* Redirect Links */
        .auth-footer-redirect {
            text-align: center;
            margin-top: 24px;
            font-size: 0.88rem;
            color: var(--text-muted);
        }

        .auth-footer-redirect a {
            color: var(--primary-green);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .auth-footer-redirect a:hover {
            color: #34d399;
            text-decoration: underline;
        }

        /* Glass notification stack (bottom-right toasts) */
        .glass-notification-node {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 20px;
            border-radius: 16px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            pointer-events: auto;
            min-width: 280px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            animation: slideIn 0.3s cubic-bezier(0.19, 1, 0.22, 1);
            transition: all 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%) scale(0.9);
                opacity: 0;
            }

            to {
                transform: translateX(0) scale(1);
                opacity: 1;
            }
        }

        .glass-notification-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .glass-notification-node.success .glass-notification-icon {
            color: var(--primary-green);
            background: rgba(16, 185, 129, 0.1);
        }

        .glass-notification-node.error .glass-notification-icon {
            color: var(--danger-red);
            background: rgba(239, 68, 68, 0.1);
        }

        .glass-notification-node.info .glass-notification-icon {
            color: var(--primary-blue);
            background: rgba(59, 130, 246, 0.1);
        }

        .glass-notification-content {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .glass-notification-content .label {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        .glass-notification-content .message {
            font-size: 0.8rem;
            color: var(--text-light);
            font-weight: 500;
        }

        /* Responsive settings */
        @media (max-width: 560px) {
            .auth-card {
                padding: 30px 24px;
            }
        }
    </style>
</head>

<body>

    <div class="auth-card">
        <div class="auth-header">
            <h1>Durk<span>walmart</span></h1>
            <p>User Authentication Protocol</p>
        </div>

        <form id="loginForm">
            <!-- Username/Email Field -->
            <div class="form-group">
                <label class="form-label" for="identifier">Identity Email</label>
                <div class="input-wrapper">
                    <input type="text" id="identifier" class="form-input" placeholder="Enter credentials" required
                        autocomplete="username">
                    <i class="bi bi-person input-icon"></i>
                </div>
            </div>

            <!-- Password Field -->
            <div class="form-group">
                <label class="form-label" for="password">Security Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required
                        autocomplete="current-password">
                    <i class="bi bi-shield-lock input-icon"></i>
                </div>
            </div>

            <!-- Login Action Trigger -->
            <button type="submit" id="loginBtn" class="btn-submit">Login</button>
        </form>

        <div class="auth-footer-redirect">
            New agent? <a href="/register.html">Register Identity</a>
        </div>
    </div>

    <!-- Glassy Notification UI Section -->
    <div id="glassNotifyContainer" class="fixed bottom-8 right-8 z-[100] flex flex-col gap-3 pointer-events-none"></div>

    <script>
        const loginForm = document.getElementById('loginForm');

        function showGlassNotification(message, type = 'success') {
            const container = document.getElementById('glassNotifyContainer');
            if (!container) return;

            const node = document.createElement('div');
            node.className = `glass-notification-node ${type}`;

            const icons = {
                success: 'bi-shield-check',
                error: 'bi-exclamation-octagon',
                info: 'bi-info-circle'
            };

            node.innerHTML = `
                <div class="glass-notification-icon">
                    <i class="bi ${icons[type] || icons.info}"></i>
                </div>
                <div class="glass-notification-content">
                    <span class="label">System Handshake</span>
                    <p class="message">${message}</p>
                </div>
            `;

            container.appendChild(node);
            setTimeout(() => {
                node.style.opacity = '0';
                node.style.transform = 'translateX(20px)';
                setTimeout(() => node.remove(), 400);
            }, 4000);
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const identifier = document.getElementById('identifier').value.trim();
            const password = document.getElementById('password').value.trim();
            const loginBtn = document.getElementById('loginBtn');

            loginBtn.disabled = true;
            showGlassNotification("Synchronizing with master node...", "info");

            try {
                const res = await fetch('/api/users/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: identifier, password })
                });
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('wa_ads_registered_user', data.user.username);
                    showGlassNotification("Authentication successful. Redirecting...", "success");
                    setTimeout(() => window.location.href = '/user/dashboard.html', 1500);
                } else {
                    showGlassNotification(data.message, "error");
                    loginBtn.disabled = false;
                }
            } catch (err) {
                showGlassNotification("Connection Refused", "error");
                loginBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
