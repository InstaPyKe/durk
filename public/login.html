<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | DurkWalmat Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            font-family: 'Inter', system-ui, sans-serif;
            color: #e6edf3;
        }
        .glass-panel {
            background: rgba(22, 27, 34, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        @keyframes glassSlideIn {
            from { transform: translateX(100%) scale(0.9); opacity: 0; }
            to { transform: translateX(0) scale(1); opacity: 1; }
        }
        .glass-notification-node {
            animation: glassSlideIn 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            background: rgba(16, 185, 129, 0.1);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md glass-panel p-8 rounded-[2.5rem] shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black tracking-tighter text-white mb-2">
                Durk<span class="text-emerald-500">walmart</span>
            </h1>
            <p class="text-gray-400 text-sm font-medium uppercase tracking-widest">User Authentication Protocol</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 mb-2">Identity Email</label>
                <div class="relative">
                    <i class="bi bi-person absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    <input type="text" id="identifier" required placeholder="Enter credentials"
                        class="w-full bg-black/20 border border-gray-800 rounded-2xl py-3 pl-12 pr-4 focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 transition outline-none text-sm">
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 mb-2">Security Password</label>
                <div class="relative">
                    <i class="bi bi-shield-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    <input type="password" id="password" required placeholder="••••••••"
                        class="w-full bg-black/20 border border-gray-800 rounded-2xl py-3 pl-12 pr-4 focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 transition outline-none text-sm">
                </div>
            </div>

            <button type="submit" id="loginBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-black font-black uppercase tracking-widest py-4 rounded-2xl transition-all shadow-xl shadow-emerald-900/20 active:scale-[0.98] text-xs">
                Login
            </button>
        </form>

        <p class="mt-8 text-center text-xs text-gray-500">
            New agent? <a href="/register.html" class="text-emerald-500 hover:underline font-bold">Register Identity</a>
        </p>
    </div>

    <!-- Glassy Notification UI Section -->
    <div id="glassNotifyContainer" class="fixed bottom-8 right-8 z-[100] flex flex-col gap-3 pointer-events-none"></div>

    <script>
        const loginForm = document.getElementById('loginForm');

        function showGlassNotification(message, type = 'success') {
            const container = document.getElementById('glassNotifyContainer');
            if (!container) return;

            const node = document.createElement('div');
            node.className = 'glass-notification-node flex items-center gap-4 p-5 rounded-2xl pointer-events-auto min-w-[280px] shadow-2xl';
            
            const icons = {
                success: 'bi-shield-check text-emerald-400',
                error: 'bi-exclamation-octagon text-rose-400',
                info: 'bi-info-circle text-blue-400'
            };

            node.innerHTML = `
                <div class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center shrink-0 border border-white/10">
                    <i class="bi ${icons[type] || icons.info} text-lg"></i>
                </div>
                <div class="flex flex-col">
                    <span class="text-[8px] font-black uppercase tracking-widest text-white/40 mb-1">System Handshake</span>
                    <p class="text-[9px] italic text-emerald-100/90 leading-tight uppercase tracking-tighter">${message}</p>
                </div>
            `;

            container.appendChild(node);
            setTimeout(() => {
                node.style.opacity = '0';
                node.style.transform = 'translateX(20px)';
                setTimeout(() => node.remove(), 400);
            }, 4000);
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const identifier = document.getElementById('identifier').value.trim();
            const password = document.getElementById('password').value.trim();
            const loginBtn = document.getElementById('loginBtn');

            loginBtn.disabled = true;
            showGlassNotification("Synchronizing with master node...", "info");

            try {
                const res = await fetch('/api/users/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: identifier, password })
                });
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('wa_ads_registered_user', data.user.username);
                    showGlassNotification("Authentication successful. Redirecting...", "success");
                    setTimeout(() => window.location.href = '/user/dashboard.html', 1500);
                } else {
                    showGlassNotification(data.message, "error");
                    loginBtn.disabled = false;
                }
            } catch (err) {
                showGlassNotification("Connection Refused", "error");
                loginBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
