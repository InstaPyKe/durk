<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node Activation | durkwalmart</title>
    <style>
        :root {
            --primary-blue: #0070f3;
            --primary-green: #00ea87;
            --primary-yellow: #ffd700;
            --text-light: #e6edf3;
            --text-dark: #0a0a0a;
            --font-sharp: 'Inter', system-ui, sans-serif;
            --glass-bg: rgba(22, 27, 34, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(12px);
            --neon-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-sharp); }

        body {
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            color: var(--text-light);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .navbar {
            height: 75px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 6%;
            background: rgba(3, 5, 10, 0.85);
            backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--glass-border);
            z-index: 1000;
        }

        .logo { font-size: 1.6rem; font-weight: 900; color: #fff; text-decoration: none; }
        .logo span { color: var(--primary-green); }

        .auth-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .auth-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            width: 100%;
            max-width: 440px;
            padding: 45px 40px;
            box-shadow: var(--neon-shadow);
            text-align: center;
            border-top: 4px solid var(--primary-green);
        }

        .auth-header h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 10px; }
        .auth-header p { font-size: 0.9rem; color: rgba(255, 255, 255, 0.5); margin-bottom: 30px; }

        .payment-box {
            background: rgba(16, 185, 129, 0.05);
            border: 1px solid rgba(16, 185, 129, 0.1);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .fee-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 8px;
        }

        .fee-amount {
            font-size: 2.8rem;
            font-weight: 900;
            color: var(--primary-green);
            letter-spacing: -1px;
        }

        .info-text {
            font-size: 0.85rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 30px;
        }

        .btn-submit {
            width: 100%;
            padding: 18px;
            background: var(--primary-green);
            color: var(--text-dark);
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 10px 20px rgba(0, 234, 135, 0.15);
        }

        .btn-submit:hover {
            background: #00c672;
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(0, 234, 135, 0.25);
        }

        .gateways {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 35px;
            opacity: 0.9;
            align-items: center;
            flex-wrap: wrap;
        }

        .gateways img {
            height: 24px;
            width: auto;
            object-fit: contain;
        }

        /* Background Simulation Layer */
        #balloon-canvas { position: fixed; top: 0; left: 0; z-index: -1; }
    </style>
</head>
<body>
    <header class="navbar">
        <a href="index.html" class="logo">Durk<span>walmart</span></a>
    </header>

    <canvas id="balloon-canvas"></canvas>

    <main class="auth-container">
        <article class="auth-card">
            <div class="auth-header">
                <h1>ACTIVATE ACC.</h1>
                <p>Initialize your terminal for task processing.</p>
            </div>

            <div class="payment-box">
                <div class="fee-label">One-Time Fee</div>
                <div class="fee-amount">Ksh. 500</div>
            </div>

            <p class="info-text">
                Unlock full access to the high-velocity Ads Engine, Market Analytics, and the global payout matrix. 
                Verification typically completes within <span style="color: var(--primary-green)">2 minutes</span>.
            </p>

            <button id="proceedBtn" class="btn-submit">Proceed to Secure Payment</button>

            <div class="gateways">
                <img src="/uploads/visa.png" alt="Visa, Mastercard, M-Pesa Gateways">
            </div>
        </article>
    </main>

    <script src="payment.js"></script>
</body>
</html>
