<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join durkwalmart - Agent Registration Portal</title>
    <!-- Google Fonts Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        /* Modern Premium Style Design */
        :root {
            --primary-green: #10b981;
            --primary-blue: #3b82f6;
            --primary-yellow: #f59e0b;
            --danger-red: #ef4444;
            --bg-dark: #0f172a;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --glass-bg: rgba(30, 41, 59, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(12px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background: radial-gradient(circle at top right, rgba(16, 185, 129, 0.07), transparent 450px),
                        radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.07), transparent 450px),
                        #0b0f19;
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Navbar Styling */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: rgba(11, 15, 25, 0.7);
            backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--glass-border);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text-light);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .logo span {
            color: var(--primary-green);
        }

        /* Container & Card Layout */
        .auth-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 120px 20px 60px 20px;
        }

        .auth-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            width: 100%;
            max-width: 480px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .auth-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
            border-color: rgba(16, 185, 129, 0.2);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-header h1 {
            font-size: 1.85rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #fff;
            margin-bottom: 6px;
        }

        .auth-header p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* Referral Notice */
        #referrerNotice {
            background: rgba(16, 185, 129, 0.08);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 0.85rem;
            color: #fff;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #referrerNotice.hidden {
            display: none !important;
        }

        /* Form Groups */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-light);
            opacity: 0.9;
        }

        .input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 16px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.25s ease;
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .form-input:focus {
            border-color: var(--primary-green);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
            background: rgba(15, 23, 42, 0.8);
        }

        /* Password input specific */
        .password-input {
            padding-right: 45px;
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            transition: color 0.2s;
        }
        .toggle-password:hover {
            color: var(--primary-green);
        }

        /* Validation classes */
        .input-invalid {
            border-color: var(--danger-red) !important;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1) !important;
        }

        .input-valid {
            border-color: var(--primary-green) !important;
        }

        .field-feedback {
            font-size: 0.78rem;
            margin-top: 6px;
            display: none;
            font-weight: 500;
        }

        .feedback-error {
            color: var(--danger-red);
            display: block;
        }

        .feedback-success {
            color: var(--primary-green);
            display: block;
        }

        /* Password Strength Meter */
        .strength-container {
            margin-top: 8px;
        }

        .strength-bar-wrapper {
            height: 4px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 6px;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            border-radius: 2px;
            transition: width 0.3s ease, background-color 0.3s ease;
        }

        .strength-label {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--primary-green);
            color: #0b0f19;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: #059669;
            transform: translateY(-1px);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.3);
            cursor: not-allowed;
            transform: none;
        }

        /* Notifications & Alerts */
        .form-alert-container {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            margin-top: 20px;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid var(--glass-border);
            animation: fadeIn 0.3s ease;
        }

        .form-alert-container.hidden {
            display: none !important;
        }

        .form-alert-container.success {
            background: rgba(16, 185, 129, 0.08);
            border-color: rgba(16, 185, 129, 0.25);
            color: var(--primary-green);
        }

        .form-alert-container.error {
            background: rgba(239, 68, 68, 0.08);
            border-color: rgba(239, 68, 68, 0.25);
            color: var(--danger-red);
        }

        .form-alert-container.info {
            background: rgba(59, 130, 246, 0.08);
            border-color: rgba(59, 130, 246, 0.25);
            color: var(--primary-blue);
        }

        .form-alert-icon {
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .form-alert-content {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .form-alert-title {
            font-size: 0.72rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            opacity: 0.8;
        }

        .form-alert-message {
            font-size: 0.8rem;
            line-height: 1.35;
            color: var(--text-light);
        }

        /* Glass notification stack (bottom-right toasts) */
        .glass-notification-node {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 20px;
            border-radius: 16px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            pointer-events: auto;
            min-width: 280px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            animation: slideIn 0.3s cubic-bezier(0.19, 1, 0.22, 1);
            transition: all 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(100%) scale(0.9); opacity: 0; }
            to { transform: translateX(0) scale(1); opacity: 1; }
        }

        .glass-notification-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .glass-notification-node.success .glass-notification-icon {
            color: var(--primary-green);
            background: rgba(16, 185, 129, 0.1);
        }
        .glass-notification-node.error .glass-notification-icon {
            color: var(--danger-red);
            background: rgba(239, 68, 68, 0.1);
        }
        .glass-notification-node.info .glass-notification-icon {
            color: var(--primary-blue);
            background: rgba(59, 130, 246, 0.1);
        }

        .glass-notification-content {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .glass-notification-content .label {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        .glass-notification-content .message {
            font-size: 0.8rem;
            color: var(--text-light);
            font-weight: 500;
        }

        /* Footer Redirect Link */
        .auth-footer-redirect {
            text-align: center;
            margin-top: 24px;
            font-size: 0.88rem;
            color: var(--text-muted);
        }

        .auth-footer-redirect a {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        .auth-footer-redirect a:hover {
            color: #60a5fa;
            text-decoration: underline;
        }

        /* Footer */
        .footer {
            background: rgba(11, 15, 25, 0.8);
            backdrop-filter: var(--glass-blur);
            border-top: 1px solid var(--glass-border);
            padding: 24px 8%;
            font-size: 0.82rem;
            margin-top: auto;
        }

        .footer-wrap {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-muted);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Scrollbar styles */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        /* Responsive settings */
        @media (max-width: 560px) {
            .auth-card {
                padding: 30px 24px;
            }
            .navbar {
                padding: 15px 5%;
            }
            .auth-container {
                padding-top: 100px;
            }
        }
    </style>
</head>
<body>

    <!-- System Shared Top Header Portal -->
    <header class="navbar">
        <a href="index.html" class="logo">Durk<span>walmart</span></a>
    </header>

    <!-- Main Flex Shell Context Layer -->
    <main class="auth-container" id="mainContent">
        <!-- Scroll Progress Indicator -->
        <div id="scrollProgress" class="fixed top-0 left-0 right-0 h-1 bg-emerald-500 origin-left scale-x-0 z-50 transition-transform duration-100"></div>

        <div class="auth-card">
            <div class="auth-header">
                <h1>Sign Up</h1>
                <p>Create an account to start earning</p>
            </div>

            <!-- Referrer Identity Resolution Notice -->
            <div id="referrerNotice" class="hidden"></div>

            <form id="registrationForm" novalidate>
                
                <!-- Field 1: Username Input Component -->
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" class="form-input" placeholder="amishy" required autocomplete="username">
                    </div>
                    <div class="field-feedback" id="usernameFeedback"></div>
                </div>

                <!-- Field 2: Email Distribution Address Input -->
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" class="form-input" placeholder="example@gmail.com" required autocomplete="email">
                    </div>
                    <div class="field-feedback" id="emailFeedback"></div>
                </div>

                <!-- Field 3: Phone Number Input (Kenyan Safaricom Number) -->
                <div class="form-group">
                    <label class="form-label" for="phone">Phone Number</label>
                    <div class="input-wrapper">
                        <input type="tel" id="phone" class="form-input" placeholder="0712345678" required autocomplete="tel">
                    </div>
                    <div class="field-feedback" id="phoneFeedback"></div>
                </div>

                <!-- Field 4: Password Security Key Definition Field -->
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" class="form-input password-input" placeholder="••••••••" required autocomplete="new-password">
                        <button type="button" class="toggle-password" data-target="password" aria-label="Toggle Password Visibility">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                    <!-- Client Strength Meter Interface -->
                    <div class="strength-container">
                        <div class="strength-bar-wrapper">
                            <div class="strength-bar" id="strengthBar"></div>
                        </div>
                        <div class="strength-label" id="strengthLabel">Strength: Empty</div>
                    </div>
                    <div class="field-feedback" id="passwordFeedback"></div>
                </div>

                <!-- Field 5: Confirm Security Passphrase Matching Validation Layer -->
                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Confirm Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="confirmPassword" class="form-input password-input" placeholder="••••••••" required autocomplete="new-password">
                        <button type="button" class="toggle-password" data-target="confirmPassword" aria-label="Toggle Password Visibility">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                    <div class="field-feedback" id="confirmFeedback"></div>
                </div>

                <!-- Submission Execution Action Button Trigger -->
                <button type="submit" class="btn-submit" id="submitBtn" disabled>Create &amp; Proceed</button>

                <!-- Embedded Glass Notification Container -->
                <div id="formAlertContainer" class="form-alert-container hidden">
                    <div class="form-alert-icon"></div>
                    <div class="form-alert-content">
                        <span class="form-alert-title"></span>
                        <p class="form-alert-message"></p>
                    </div>
                </div>

            </form>

            <div class="auth-footer-redirect">
                Already a member? <a href="login.html">Sign In</a>
            </div>
        </div>
    </main>

    <!-- Structural Footer Context Layer -->
    <footer class="footer">
        <div class="footer-wrap">
            <div>&copy; 2026 Durkwalmart Platform Inc. Secure Agent Onboarding.</div>
        </div>
    </footer>

    <!-- Glassy Notification UI Section -->
    <div id="glassNotifyContainer" class="fixed bottom-8 right-8 z-[100] flex flex-col gap-3 pointer-events-none"></div>

    <!-- Verification Logic Script Context -->
    <script src="register.js"></script>
</body>
</html>
