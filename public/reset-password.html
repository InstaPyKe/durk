<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Security Key | durkwalmart</title>
    <style>
        :root {
            --primary-green: #00ea87;
            --glass-bg: rgba(22, 27, 34, 0.85);
            --text-light: #e6edf3;
            --danger-red: #ff3333;
        }
        body {
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            color: var(--text-light);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .auth-card {
            background: var(--glass-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            border-top: 4px solid var(--primary-green);
        }
        h1 { font-size: 1.5rem; margin-bottom: 20px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 8px; opacity: 0.7; }
        input {
            width: 100%;
            background: rgba(13, 17, 23, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--primary-green);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
        }
        .alert { padding: 12px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 20px; display: none; }
        .alert-error { background: rgba(255, 51, 51, 0.1); color: var(--danger-red); border: 1px solid var(--danger-red); }
        .alert-success { background: rgba(0, 234, 135, 0.1); color: var(--primary-green); border: 1px solid var(--primary-green); }
    </style>
</head>
<body>
    <div class="auth-card">
        <h1>Reset Security Key</h1>
        <div id="alert" class="alert"></div>
        
        <form id="resetForm">
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" id="confirmPassword" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-submit" id="submitBtn">Synchronize Key</button>
        </form>
    </div>

    <script src="reset-password.js"></script>
</body>
</html>
